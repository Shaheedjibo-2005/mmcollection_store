<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
<title>Delivery</title>
<style>
*{
  box-sizing:border-box;
}

body{
  font-family: Arial, sans-serif;
  background:#1c1c1c;
  margin:0;
  padding:0;
  color:white;
}

/* ===== NAVBAR ===== */

.navbar{
  background:rgba(0,0,0,0.6);
  padding:10px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  z-index:1000;
}

.brand{
  display:flex;
  align-items:center;
  gap:10px;
}

.brand img{
  width:45px;
  height:45px;
  border-radius:50%;
}

.brand span{
  color:goldenrod;
  font-size:20px;
  font-weight:bold;
}

.nav-links{
  display:flex;
  gap:25px;
}

.nav-links a{
  color:white;
  text-decoration:none;
  display:flex;
  align-items:center;
  gap:6px;
  padding:8px 12px;
}

.nav-links a i{
  color:goldenrod;
}

.nav-links a:hover{
  background:goldenrod;
  color:black;
  border-radius:6px;
}

.menu-icon{
  display:none;
  font-size:28px;
  cursor:pointer;
}

/* ===== CART AREA ===== */

#cart-items{
  max-width:900px;
  margin:110px auto 20px;
  padding:20px;
  background:black;
  border-radius:15px;
  display:flex;
  flex-direction:column;
  gap:20px;
}

.cart-item{
  display:flex;
  gap:100px;
  padding:15px;
  border-radius:10px;
  background:#1c1c1c;
  align-items:center;
  flex-wrap:wrap;
}

.cart-item img{
  width:100%;
  max-width:230px;
  border-radius:8px;
}

.cart-info{
  flex:1;
}

.cart-item h3{
  margin:0;
  color:goldenrod;
  font-size: 30px;
}

.cart-item p{
  font-size:18px;
}

/* ===== QUANTITY ===== */

.button-qtn{
  display:flex;
  gap:10px;
  font-size: 20px;
  align-items:center;
  margin:10px 100px;
  color:goldenrod
}

.qtn-box{
  width:40px;
  height:40px;
  border:none;
  border-radius:5px;
  font-size:20px;
  cursor:pointer;
}

/* ===== SELECT ===== */

.select-color,
.select-size{
  padding:8px;
  margin-top:10px;
  background-color: white;
  color: black;
}

/* ===== REMOVE BUTTON ===== */

.remove-btn{
  margin-top:10px;
  background:red;
  border:none;
  padding:10px 90px;
  color:white;
  border-radius:5px;
  cursor:pointer;
}

/* ===== TOTAL ===== */

#total-price{
  max-width:900px;
  margin:auto;
  padding:15px;
  font-size:22px;
  font-weight:bold;
  color:goldenrod;
}

/* ===== SUMMARY ===== */

.summary-box{
  max-width:400px;
  margin:20px auto;
  padding:15px;
  background:white;
  color:black;
  border-radius:8px;
}

.summary-box h3{
  color:green;
}

/* ===== FORM ===== */

.customer-form{
  max-width:400px;
  margin:20px auto;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.customer-form input{
  padding:10px;
  border-radius:5px;
  border:none;
}

.checkout-btn{
  display:block;
  margin:20px auto;
  padding:12px 20px;
  font-size:18px;
  background:#25D366;
  color:white;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

/* ===== LOADING ===== */

.loading-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

/* ===== MOBILE ===== */

@media(max-width:768px){

.nav-links{
  display:none;
  flex-direction:column;
  background:black;
  position:absolute;
  right:0;
  top:60px;
  width:220px;
}

.navbar.active .nav-links{
  display:flex;
}

.menu-icon{
  display:block;
}

.cart-item{
  flex-direction:column;
  text-align:center;
  gap: 20px;
}

.cart-item img{
  max-width:200px;
}

.cart-item h3{
  font-size:22px;
}

.cart-item p{
  font-size:16px;
}

.button-qtn{
  justify-content:center;
}

.remove-btn{
  width:100%;
  max-width:220px;
}

.brand span{
  font-size:16px;
}

}
   #grand-total, #items-total, #delivery-fee{ 
    color : goldenrod;
  }
  .loading-overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
justify-content:center;
align-items:center;
z-index:9999;
}

.loader-box{
text-align:center;
}

.logo-wrapper{
position:relative;
width:120px;
height:120px;
margin:auto;
}

/* LOGO HEARTBEAT */
.logo-loader{
    width:100px;
    border-radius: 50%;
    margin-top: 10px;
    animation:heartbeat 1.2s infinite;
    position:relative;
    z-index:2;
}
.spinner{
    position:absolute;
    width:140px;
    height:140px;
    border:4px solid rgba(212,175,55,0.2);
    border-top:4px solid #d4af37;
    border-radius:50%;
    animation:spin 1s linear infinite;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
}

@keyframes spin{
    0%{transform:translate(-50%,-50%) rotate(0deg);}
    100%{transform:translate(-50%,-50%) rotate(360deg);}
}

@keyframes heartbeat{
    0%{transform:scale(1);}
    25%{transform:scale(1.1);}
    40%{transform:scale(1);}
    60%{transform:scale(1.15);}
    100%{transform:scale(1);}
}

.loading-text{
margin-top:40px;
font-size:18px;
font-weight:bold;
color:goldenrod;
}


</style>
</head>
<body>
  <!-- ===== NAVBAR ===== -->
<nav class="navbar" id="navbar">

  <div class="brand">
    <img src="Photos/momy.jpg"  alt="logo">
    <span>M.M COLLECTION</span>
  </div>

  <div class="nav-links">
    <a href="Index.html"><i class="fa fa-home"></i>Home</a>
    <a href="About us.html"><i class="fa fa-user"></i> About us</a> 
    <a href="Contact us.html"><i class="fa fa-phone"></i> Contact us</a>
  </div>

  <div class="menu-icon" onclick="toggleMenu()">☰</div>
</nav>
<h1 style="margin-top: 80px; text-align: center; color: goldenrod;">Your Cart</h1>
<div style="text-align: center;" id="cart-items"></div>
<div class="total" id="total-price"></div>
<div class="summary-box">

<p>Items Total: ₦<span id="items-total">0</span></p>

<p>Delivery Fee: ₦<span id="delivery-fee">1500</span></p>

<h3>Grand Total: ₦<span id="grand-total">0</span></h3>

</div>
<div class="customer-form">

<input type="text" id="cust-name" placeholder="Your Name">

<input type="tel" id="cust-phone" placeholder="Phone Number">

<input type="text" id="cust-address" placeholder="Delivery Address">

</div>
<button  onclick="sendOrderWhatsApp()" class="checkout-btn">
Order on WhatsApp
</button>
<!-- LOADING OVERLAY -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="loader-box">

    <div class="logo-wrapper">
      <div class="spinner"></div>
      <img src="Photos/momy.jpg" class="logo-loader">
    </div>

    <p class="loading-text" id="loadingText">Processing Order...</p>

  </div>
</div>
<script>
  /* MENU */
function toggleMenu() {
  document.getElementById("navbar").classList.toggle("active");
}

function getCart(){
  return JSON.parse(sessionStorage.getItem("cart")) || [];
}

function saveCart(cart){
  sessionStorage.setItem("cart", JSON.stringify(cart));
}

let cart = getCart();

let container = document.getElementById("cart-items");
let totalEl = document.getElementById("total-price");

function renderCart(){

  container.innerHTML = "";

  let total = 0;

  if(cart.length === 0){

    container.innerHTML = "<h2 style='color: goldenrod;'>Your cart is empty 🛒</h2>";

    totalEl.innerText = "";

    return;
  }

  cart.forEach((item,index)=>{

    let subtotal = item.price * item.quantity;

    total += subtotal;
container.innerHTML += `
<div class="cart-item">
  <img src="${item.image}" width="100">
  <div>
    <h3>${item.name}</h3>
    <p>Price: ₦${item.price}</p>
    <p>Code: ${item.code}</p>
    ${item.size ? `<p>Size: ${item.size}</p>` : ""}

    <div class="button-qtn">
      <button class="qtn-box" onclick="decreaseQty(${index})">−</button>
      <span>${item.quantity}</span>
      <button class="qtn-box" onclick="increaseQty(${index})">+</button>
    </div>

<select class="select-color" onchange="updateColor(${index}, this.value)">
${item.colors.map(c =>
  `<option value="${c}" ${c===item.color ? "selected" : ""}>${c}</option>`
).join("")}
</select>
    <!-- Size select -->
${item.size ? `
<select onchange="updateSize(${index}, this.value)">
${item.sizes.map(s =>
  `<option value="${s}" ${s===item.size ? "selected" : ""}>${s}</option>`
).join("")}
</select>
` : ""}

    <p>Subtotal: ₦${item.price * item.quantity}</p>
    <button class="remove-btn" onclick="removeItem(${index})">
      Remove
    </button>
  </div>
</div>
`;
  });

  totalEl.innerText = "Total: ₦" + total;

  saveCart(cart);
  let deliveryFee = 1500;

document.getElementById("items-total").textContent = total;

document.getElementById("delivery-fee").textContent = deliveryFee;

document.getElementById("grand-total").textContent = total + deliveryFee;
}
function updateColor(index, newColor){
  cart[index].color = newColor;
  sessionStorage.setItem("cart", JSON.stringify(cart));
  renderCart();
}

function updateSize(index, newSize){
  cart[index].size = newSize;
  sessionStorage.setItem("cart", JSON.stringify(cart));
  renderCart();
}
function increaseQty(index){

  cart[index].quantity++;

  renderCart();

}

function decreaseQty(index){

  if(cart[index].quantity > 1){

  cart[index].quantity--;

  renderCart();

  }

}

function removeItem(index){

  cart.splice(index,1);

  sessionStorage.setItem("cart", JSON.stringify(cart));

  renderCart();

}
renderCart();
//ODER SECTION//
function sendOrderWhatsApp(){
document.getElementById("loadingOverlay").style.display = "flex";
let cart = JSON.parse(sessionStorage.getItem("cart")) || [];

if(cart.length === 0){
alert("Your cart is empty");
return;
}

let name = document.getElementById("cust-name").value;
let phone = document.getElementById("cust-phone").value;
let address = document.getElementById("cust-address").value;

let message = "🛍️ *MM COLLECTION STORE* %0A%0A";

message += "Customer Name: " + name + "%0A";
message += "Phone: " + phone + "%0A";
message += "Address: " + address + "%0A%0A";

message += "*Order List* %0A";

let total = 0;

cart.forEach((item,index)=>{

let subtotal = item.price * item.quantity;
total += subtotal;

message +=
(index+1)+". "+item.name+
"%0AColor: "+item.color+
(item.size ? "%0ASize: "+item.size : "") +
"%0AQty: "+item.quantity+
"%0APrice: ₦"+item.price+
"%0ACode: "+item.code+
"%0ASubtotal: ₦"+subtotal+
"%0AImage: "+item.image+
"%0A%0A";

});

let deliveryFee = 1500;

let grandTotal = total + deliveryFee;

message += "--------------------%0A";
message += "Items Total: ₦"+total+"%0A";
message += "Delivery Fee: ₦"+deliveryFee+"%0A";
message += "💰 *Grand Total: ₦"+grandTotal+"*%0A%0A";

message += "Thank you for shopping with us 🙏";

let storePhone = "2347038094555";

let url = "https://wa.me/"+storePhone+"?text="+message;
setTimeout(function(){

document.getElementById("loadingText").textContent = "Order Successful ✅";

setTimeout(function(){

window.open(url,"_blank");

sessionStorage.removeItem("cart");

location.reload();

},1500);

},2000);
}


    
</script>
</body>
</html>
